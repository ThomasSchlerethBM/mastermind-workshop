<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --surface:rgba(20,20,32,0.93);
  --surface2:rgba(30,30,48,0.96);
  --border:rgba(255,255,255,0.10);
  --border2:rgba(255,255,255,0.18);
  --accent:#FF6840;
  --accent2:#7eb8f7;
  --text:#f0f0f8;
  --muted:rgba(240,240,248,0.45);
  --red:#f87171;
  --green:#4ade80;
  --radius:12px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Rajdhani',sans-serif;color:var(--text)}
body{
  background:#0a0a12 url('https://images.unsplash.com/photo-1534796636912-3b95919f04cb?w=1600&q=80') center/cover no-repeat fixed;
}
body::before{content:'';position:fixed;inset:0;background:rgba(8,8,18,0.80);backdrop-filter:blur(1px);z-index:0}
#app{position:relative;z-index:1;min-height:100vh;max-width:1100px;margin:0 auto;padding:16px}
.hidden{display:none!important}

/* ── SPLASH ── */
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.splash-logo h1{font-size:clamp(2.8rem,6vw,5rem);font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);text-shadow:0 0 60px rgba(255,104,64,.35);line-height:1;text-align:center}
.splash-logo p{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:8px;text-align:center}
.lang-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.lang-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 20px;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,104,64,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.lang-flag{font-size:2.2rem;line-height:1}

/* ── ROLE SELECT ── */
#role-select{min-height:calc(100vh - 32px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;animation:fadeUp .4s ease both}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:480px}
.role-card{padding:36px 24px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.role-icon{font-size:2.4rem;margin-bottom:10px}
.role-name{font-size:1.2rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.role-desc{font-size:.8rem;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace}
.back-btn{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;padding:8px 0}
.back-btn:hover{color:var(--text)}

/* ── PIN ── */
#admin-pin{min-height:calc(100vh - 32px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;animation:fadeUp .3s ease both}
.pin-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center;width:100%;max-width:360px}
.pin-box h2{font-size:1.3rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.pin-box p{font-size:.8rem;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:24px}
.pin-input{width:100%;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:rgba(255,255,255,.05);font-family:'Space Mono',monospace;font-size:1rem;color:var(--text);text-align:center;letter-spacing:.15em;outline:none;transition:border-color .2s}
.pin-input:focus{border-color:var(--accent)}
.pin-error{font-size:.8rem;color:var(--red);font-family:'Space Mono',monospace;margin-top:8px;min-height:20px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.hdr-title{font-size:1.2rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.badge{font-size:.7rem;padding:4px 12px;border-radius:20px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge.admin{background:rgba(255,104,64,.15);border:1px solid rgba(255,104,64,.3);color:var(--accent)}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;color:var(--muted);transition:all .15s;letter-spacing:.04em;text-transform:uppercase}
.tab.active{background:rgba(255,104,64,.12);border-color:rgba(255,104,64,.4);color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px}
.card-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;font-family:'Space Mono',monospace}

/* ── SLOTS ── */
.slots{display:flex;gap:12px;margin:12px 0 22px;flex-wrap:wrap}
.slot{width:58px;height:58px;border-radius:50%;border:2px dashed rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:1.4rem;color:var(--muted)}
.slot.active-slot{border-style:solid;border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,104,64,.2)}
.slot.filled{border-style:solid;border-color:rgba(255,255,255,.2)}
.slot .clr{width:100%;height:100%;border-radius:50%}

/* ── PALETTE ── */
.palette{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px}
.pchip{width:46px;height:46px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .18s;position:relative}
.pchip:hover{transform:scale(1.15);border-color:rgba(255,255,255,.7)}
.plabel{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--muted);white-space:nowrap;font-family:'Space Mono',monospace}

/* ── TOGGLE ── */
.toggle-row{display:flex;align-items:center;gap:12px;margin:12px 0}
.tog{position:relative;width:46px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:rgba(255,255,255,.15);border-radius:26px;cursor:pointer;transition:.2s}
.tog-sl::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--accent)}
.tog input:checked+.tog-sl::before{transform:translateX(20px)}
.tog-label{font-size:.9rem;color:var(--text);font-weight:500}

/* ── BUTTONS ── */
button{cursor:pointer;font-family:'Rajdhani',sans-serif}
.btn{padding:10px 22px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:rgba(255,255,255,.05);font-size:.9rem;font-weight:600;color:var(--text);transition:all .18s;letter-spacing:.04em;text-transform:uppercase}
.btn:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.3)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.btn.primary:hover{background:#FF8060;box-shadow:0 6px 20px rgba(255,104,64,.35)}
.btn.danger{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.4);color:var(--red)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── INPUTS ── */
input[type=text],select{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:rgba(255,255,255,.05);font-family:'Rajdhani',sans-serif;font-size:.95rem;color:var(--text);outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
select option{background:#1a1a28;color:var(--text)}

/* ── TEAMS ── */
.team-input-row{display:flex;gap:8px;margin-bottom:14px}
.team-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.team-name-text{font-size:.95rem;font-weight:600;letter-spacing:.04em}
.team-link-text{font-size:.68rem;color:var(--accent2);word-break:break-all;margin-top:3px;font-family:'Space Mono',monospace}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;border-top:3px solid var(--border)}
.dash-card.playing{border-top-color:var(--accent2)}.dash-card.won{border-top-color:var(--green)}.dash-card.lost{border-top-color:var(--red)}
.dash-name{font-size:1rem;font-weight:700;letter-spacing:.04em;margin-bottom:3px}
.dash-status{font-size:.72rem;color:var(--muted);margin-bottom:10px;font-family:'Space Mono',monospace}
.dash-status.won{color:var(--green)}.dash-status.lost{color:var(--red)}.dash-status.playing{color:var(--accent2)}
.mini-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mini-dot{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.mini-hints{display:flex;gap:3px;margin-left:4px}
.hint{width:10px;height:10px;border-radius:50%}
.hint.b{background:#111;border:1px solid #555}.hint.w{background:#ddd;border:1px solid #aaa}.hint.e{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.prog-bg{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px}
.prog-fill{height:4px;background:var(--accent2);border-radius:2px;transition:width .4s}
.prog-label{font-size:.68rem;color:var(--muted);font-family:'Space Mono',monospace;min-width:28px;text-align:right}

/* ── GAME ── */
.game-layout{display:grid;grid-template-columns:210px 1fr;gap:16px}
@media(max-width:620px){.game-layout{grid-template-columns:1fr}}
.history-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;max-height:65vh;overflow-y:auto}
.hist-row{display:flex;align-items:center;gap:6px;padding:7px 9px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:5px;border:1px solid var(--border);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.hist-num{font-size:.68rem;color:var(--muted);font-family:'Space Mono',monospace;width:14px;text-align:center;flex-shrink:0}
.h-dots{display:flex;gap:3px}
.h-dot{width:19px;height:19px;border-radius:50%;border:1px solid rgba(255,255,255,.12)}
.h-hints{display:flex;flex-wrap:wrap;gap:2px;width:32px}

/* ── OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.ov-box{background:var(--surface2);border:1px solid var(--border2);border-radius:16px;padding:44px;text-align:center;max-width:380px;width:92%;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);position:relative}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.ov-icon{font-size:3.5rem;margin-bottom:14px}
.ov-title{font-size:2rem;font-weight:700;letter-spacing:.06em;margin-bottom:8px}
.ov-sub{font-size:.82rem;color:var(--muted);font-family:'Space Mono',monospace;line-height:1.6}
.ov-code{display:flex;gap:8px;justify-content:center;margin:14px 0}
.ov-dot{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}

/* ── MSG ── */
.msg{padding:10px 14px;border-radius:var(--radius-sm);font-size:.85rem;margin-top:10px;font-family:'Space Mono',monospace}
.msg.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green)}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}

/* ── LOADING ── */
.loading{text-align:center;padding:48px;color:var(--muted);font-size:.9rem;font-family:'Space Mono',monospace}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.lang-menu-item{display:block;width:100%;padding:9px 14px;background:none;border:none;text-align:left;font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:600;color:var(--text);cursor:pointer;transition:background .15s;letter-spacing:.03em}
.lang-menu-item:hover{background:rgba(255,255,255,.08)}
.lang-menu-item+.lang-menu-item{border-top:1px solid var(--border)}
</style>
</head>
<body>
<div id="app">


<!-- ══ SPLASH ══ -->
<div id="splash" class="hidden">
  <div class="splash-logo">
    <h1>Mastermind</h1>
    <p>Workshop Edition</p>
  </div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="setLang('en')"><span class="lang-flag">🇺🇸</span>English</button>
    <button class="lang-btn" onclick="setLang('de')"><span class="lang-flag">🇩🇪</span>Deutsch</button>
    <button class="lang-btn" onclick="setLang('zh')"><span class="lang-flag">🇨🇳</span>中文</button>
    <button class="lang-btn" onclick="setLang('sk')"><span class="lang-flag">🇸🇰</span>Slovensky</button>
    <button class="lang-btn" onclick="setLang('pl')"><span class="lang-flag">🇵🇱</span>Polski</button>
  </div>
  <button class="back-btn" onclick="resetFbConfigModal()" style="font-size:.72rem;opacity:.25;pointer-events:none;display:none">⚙ Firebase neu konfigurieren</button>
</div>

<!-- ══ ROLE SELECT ══ -->
<div id="role-select" class="hidden">
  <div style="text-align:center">
    <div style="font-size:2rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)">Mastermind</div>
    <div style="font-size:.78rem;color:var(--muted);font-family:'Space Mono',monospace;margin-top:4px" id="rs-sub"></div>
  </div>
  <div class="role-grid">
    <div class="role-card" onclick="goAdminPin()">
      <div class="role-icon">🔧</div>
      <div class="role-name" id="role-admin-name"></div>
      <div class="role-desc" id="role-admin-desc"></div>
    </div>
    <div class="role-card" onclick="showTeamSelect()">
      <div class="role-icon">🎮</div>
      <div class="role-name" id="role-team-name"></div>
      <div class="role-desc" id="role-team-desc"></div>
    </div>
  </div>
  <div id="team-select-area" class="hidden" style="width:100%;max-width:480px">
    <div class="card">
      <div class="card-title" id="ts-title"></div>
      <div id="team-picker-list" style="display:flex;flex-direction:column;gap:6px"></div>
      <div id="team-picker-empty" style="font-size:.82rem;color:var(--muted);font-family:'Space Mono',monospace"></div>
    </div>
  </div>
  <button class="back-btn" onclick="backToLang()">← <span id="back-lang-label"></span></button>
</div>

<!-- ══ ADMIN PIN ══ -->
<div id="admin-pin" class="hidden">
  <div class="pin-box">
    <h2 id="pin-title"></h2>
    <p id="pin-sub"></p>
    <input type="password" class="pin-input" id="pin-input" onkeydown="if(event.key==='Enter')checkPin()">
    <div class="pin-error" id="pin-error"></div>
    <div style="margin-top:20px;display:flex;gap:10px;justify-content:center">
      <button class="btn" onclick="backToRole()" id="pin-back-btn"></button>
      <button class="btn primary" onclick="checkPin()" id="pin-enter-btn"></button>
    </div>
  </div>
</div>

<!-- ══ ADMIN VIEW ══ -->
<div id="admin-view" class="hidden">
  <div class="hdr">
    <div class="hdr-title">Mastermind</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="badge admin" id="hdr-admin-badge">Admin</span>
      <button class="btn" style="font-size:.78rem;padding:6px 14px" onclick="logout()" id="btn-logout"></button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="adminTab('setup',this)" id="tab-setup-lbl"></div>
    <div class="tab" onclick="adminTab('teams',this)" id="tab-teams-lbl"></div>
    <div class="tab" onclick="adminTab('dashboard',this)" id="tab-dash-lbl"></div>
  </div>

  <!-- Setup Tab -->
  <div id="atab-setup">
    <div class="card">
      <div class="card-title" id="lbl-set-code"></div>
      <div style="font-size:.82rem;color:var(--muted);margin-bottom:10px;font-family:'Space Mono',monospace" id="lbl-set-hint"></div>
      <div class="slots">
        <div class="slot active-slot" id="asl-0" onclick="selectASlot(0)"><span>+</span></div>
        <div class="slot" id="asl-1" onclick="selectASlot(1)"><span>+</span></div>
        <div class="slot" id="asl-2" onclick="selectASlot(2)"><span>+</span></div>
        <div class="slot" id="asl-3" onclick="selectASlot(3)"><span>+</span></div>
      </div>
      <div class="palette" id="admin-palette"></div>
      <div class="toggle-row">
        <label class="tog"><input type="checkbox" id="allow-dups" checked><span class="tog-sl"></span></label>
        <span class="tog-label" id="lbl-dups"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin:10px 0 18px">
        <span style="font-size:.85rem;color:var(--muted);font-family:'Space Mono',monospace" id="lbl-max-tries"></span>
        <select id="max-tries"><option value="8">8</option><option value="10" selected>10</option><option value="12">12</option></select>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="adminClearCode()" id="btn-reset"></button>
        <button class="btn" onclick="adminRandom()" id="btn-random"></button>
        <button class="btn primary" onclick="saveChallenge()" id="btn-save-ch"></button>
      </div>
      <div id="setup-msg"></div>
    </div>
    <div class="card">
      <div class="card-title" id="lbl-cur-ch"></div>
      <div id="current-ch-display" style="font-size:.82rem;color:var(--muted);font-family:'Space Mono',monospace"></div>
    </div>
  </div>

  <!-- Background Image Card -->
  <div class="card" id="atab-setup-bg" style="display:none">
    <div class="card-title" id="lbl-bg-title">Background image</div>
    <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
      <div id="bg-preview" style="width:120px;height:80px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:#111 center/cover no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center">
        <span style="font-size:1.6rem;opacity:.3">🖼</span>
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:.78rem;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:12px;line-height:1.6" id="lbl-bg-hint">Upload an image file (JPG, PNG, WebP). It will be stored locally and shown as background for all visitors on this device.</div>
        <div class="btn-row">
          <label class="btn" style="cursor:pointer" id="lbl-bg-upload-btn">
            📁 <span id="lbl-bg-choose">Choose image</span>
            <input type="file" accept="image/*" id="bg-file-input" style="display:none" onchange="handleBgUpload(this)">
          </label>
          <button class="btn danger" onclick="removeBg()" id="btn-bg-remove" style="display:none"></button>
        </div>
        <div id="bg-msg"></div>
      </div>
    </div>
  </div>

  <!-- Teams Tab -->
  <div id="atab-teams" class="hidden">
    <div class="card">
      <div class="card-title" id="lbl-manage-teams"></div>
      <div class="team-input-row">
        <input type="text" id="new-team-inp" style="flex:1;max-width:300px" onkeydown="if(event.key==='Enter')addTeam()">
        <button class="btn primary" onclick="addTeam()" id="btn-add-team"></button>
      </div>
      <div id="team-list-admin"></div>
      <div id="team-msg"></div>
    </div>
    <div class="card">
      <div class="card-title" id="lbl-team-links"></div>
      <div style="font-size:.78rem;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:14px" id="lbl-link-hint"></div>
      <div id="team-links-list"></div>
    </div>
  </div>

  <!-- Dashboard Tab -->
  <div id="atab-dashboard" class="hidden">

function buildDashCard(team,gs,ch){
  if(!gs)return`<div id="dc-${team.id}" class="dash-card"><div class="dash-name">${team.name}</div><div class="dash-status">${t.dash_waiting}</div><div style="font-size:.72rem;color:var(--muted);padding:10px 0;font-family:'Space Mono',monospace">${t.dash_no_tries}</div></div>`;
  const guesses=gs.guesses||[];
  const sc=gs.won?'won':gs.lost?'lost':'playing';
  const st=gs.won?t.dash_solved(guesses.length):gs.lost?t.dash_lost:t.dash_attempt(guesses.length,ch?ch.maxGuesses:10);
  const mini=guesses.slice(-3).map(g=>{
    const dots=g.guess.map(c=>`<div class="mini-dot" style="background:${c}"></div>`).join('');
    const hints=[...Array(g.black).fill('<div class="hint b"></div>'),...Array(g.white).fill('<div class="hint w"></div>'),...Array(4-g.black-g.white).fill('<div class="hint e"></div>')].join('');
    return`<div class="mini-row">${dots}<div class="mini-hints">${hints}</div></div>`;
  }).join('');
  const max=ch?ch.maxGuesses:10;
  const pct=Math.round((guesses.length/max)*100);
  return`<div id="dc-${team.id}" class="dash-card ${sc}"><div class="dash-name">${team.name}</div><div class="dash-status ${sc}">${st}</div>${mini||`<div style="font-size:.72rem;color:var(--muted);font-family:'Space Mono',monospace">${t.dash_no_tries}</div>`}<div class="prog-row"><div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-label">${guesses.length}/${max}</span></div></div>`;
}

function selectTSlot(i){
  tvSlot=i;
  for(let j=0;j<4;j++){
    const el=document.getElementById('tvsl-'+j);
    el.className='slot'+(j===i?' active-slot':'')+(tvCode[j]?' filled':'');
    el.innerHTML=tvCode[j]?`<div class="clr" style="background:${tvCode[j]}" onclick="selectTSlot(${j})"></div>`:'<span>+</span>';
  }
}
function updateTSlots(){selectTSlot(tvSlot);}
function tvClearGuess(){tvCode=[null,null,null,null];tvSlot=0;for(let i=0;i<4;i++){const el=document.getElementById('tvsl-'+i);el.className='slot'+(i===0?' active-slot':'');el.innerHTML='<span>+</span>';}checkSubmitBtn();}
function checkSubmitBtn(){document.getElementById('btn-submit').disabled=gameOver||tvCode.includes(null);}

function evaluate(guess,code){
  let black=0,white=0;const cc=[...code],gc=[...guess];
  for(let i=0;i<4;i++){if(gc[i]===cc[i]){black++;cc[i]=null;gc[i]=null;}}
  for(let i=0;i<4;i++){if(gc[i]===null)continue;const j=cc.indexOf(gc[i]);if(j!==-1){white++;cc[j]=null;}}
  return{black,white};
}

async function submitGuess(){
  if(gameOver||tvCode.includes(null))return;
  const res=evaluate(tvCode,challenge.code);
  gameState.guesses.push({guess:[...tvCode],black:res.black,white:res.white});
  if(res.black===4)gameState.won=true;
  else if(gameState.guesses.length>=challenge.maxGuesses)gameState.lost=true;
  try{
    await dbSet('gamestate/'+currentTeamId,{...gameState,teamName:currentTeamName,maxGuesses:challenge.maxGuesses});
  }catch(e){showMsg('tv-msg','Save error!','err');gameState.guesses.pop();return;}
  gameOver=gameState.won||gameState.lost;
  renderHistory();updateTvProgress();tvClearGuess();
  if(gameState.won)setTimeout(()=>showWin(),400);
  else if(gameState.lost)setTimeout(()=>showLose(),400);
  else if(gameOver)disableInput();
}

function renderHistory(){
  const el=document.getElementById('tv-history');
  if(!gameState.guesses.length){el.innerHTML='';return;}
  el.innerHTML=[...gameState.guesses].reverse().map((g,ri)=>{
    const num=gameState.guesses.length-ri;
    const dots=g.guess.map(c=>`<div class="h-dot" style="background:${c}"></div>`).join('');
    const hints=[...Array(g.black).fill('<div class="hint b"></div>'),...Array(g.white).fill('<div class="hint w"></div>'),...Array(4-g.black-g.white).fill('<div class="hint e"></div>')].join('');
    return`<div class="hist-row" style="${g.black===4?'border-color:var(--green)':''}"><span class="hist-num">${num}</span><div class="h-dots">${dots}</div><div class="h-hints">${hints}</div></div>`;
  }).join('');
}
function updateTvProgress(){
  document.getElementById('tv-used').textContent=gameState.guesses.length;
  document.getElementById('tv-max').textContent=challenge.maxGuesses;
}
function disableInput(){
  document.getElementById('btn-submit').disabled=true;
  document.querySelectorAll('#tv-palette .pchip').forEach(el=>el.style.opacity='.25');
}
function showWin(){
  document.getElementById('ov-win-code').innerHTML=challenge.code.map(c=>`<div class="ov-dot" style="background:${c}"></div>`).join('');
  document.getElementById('ov-win-txt').textContent=t.ov_win_txt(gameState.guesses.length,challenge.maxGuesses);
  document.getElementById('ov-win').classList.add('show');disableInput();
}
function showLose(){
  document.getElementById('ov-lose-code').innerHTML=challenge.code.map(c=>`<div class="ov-dot" style="background:${c}"></div>`).join('');
  document.getElementById('ov-lose').classList.add('show');disableInput();
}
function showMsg(id,txt,type){
  const el=document.getElementById(id);
  el.className='msg '+type;el.textContent=txt;
  setTimeout(()=>{el.className='';el.textContent='';},4000);
}

// ════ BACKGROUND IMAGE ════
function initBg(){
  const saved=localStorage.getItem('mm_bg');
  if(saved){
    document.body.style.backgroundImage=`url('${saved}')`;
    const prev=document.getElementById('bg-preview');
    if(prev){prev.style.backgroundImage=`url('${saved}')`;prev.innerHTML='';}
    const removeBtn=document.getElementById('btn-bg-remove');
    if(removeBtn)removeBtn.style.display='';
  }
}

function handleBgUpload(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){showMsg('bg-msg','Image too large (max 5 MB).','err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const data=e.target.result;
    try{
      localStorage.setItem('mm_bg',data);
      document.body.style.backgroundImage=`url('${data}')`;
      const prev=document.getElementById('bg-preview');
      prev.style.backgroundImage=`url('${data}')`;prev.innerHTML='';
      document.getElementById('btn-bg-remove').style.display='';
      showMsg('bg-msg',t.ch_saved.replace('Challenge','Image'),'ok');
    }catch(e){showMsg('bg-msg','Storage full — try a smaller image.','err');}
  };
  reader.readAsDataURL(file);
  input.value='';
}

function removeBg(){
  localStorage.removeItem('mm_bg');
  document.body.style.backgroundImage=`url('https://images.unsplash.com/photo-1534796636912-3b95919f04cb?w=1600&q=80')`;
  const prev=document.getElementById('bg-preview');
  prev.style.backgroundImage='';prev.innerHTML='<span style="font-size:1.6rem;opacity:.3">🖼</span>';
  document.getElementById('btn-bg-remove').style.display='none';
}

function applyBgLang(){
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const bgLabels={
    en:{title:'Background image',hint:'Upload an image file (JPG, PNG, WebP). Stored locally in this browser.',choose:'Choose image',remove:'Remove image'},
    de:{title:'Hintergrundbild',hint:'Bilddatei hochladen (JPG, PNG, WebP). Wird lokal im Browser gespeichert.',choose:'Bild wählen',remove:'Bild entfernen'},
    zh:{title:'背景图片',hint:'上传图片文件（JPG、PNG、WebP）。保存在本地浏览器中。',choose:'选择图片',remove:'删除图片'},
    sk:{title:'Obrázok pozadia',hint:'Nahraj obrázok (JPG, PNG, WebP). Uloží sa lokálne v prehliadači.',choose:'Vybrať obrázok',remove:'Odstrániť obrázok'},
    pl:{title:'Obraz tła',hint:'Prześlij plik obrazu (JPG, PNG, WebP). Zapisany lokalnie w przeglądarce.',choose:'Wybierz obraz',remove:'Usuń obraz'},
  };
  const lb=bgLabels[lang]||bgLabels.en;
  s('lbl-bg-title',lb.title);s('lbl-bg-hint',lb.hint);s('lbl-bg-choose',lb.choose);
  const rb=document.getElementById('btn-bg-remove');if(rb)rb.textContent=lb.remove;
}

// ════ TEAM LANGUAGE SWITCHER ════
function toggleLangMenu(){
  const menu=document.getElementById('lang-menu');
  menu.style.display=menu.style.display==='none'?'block':'none';
}
// Close menu when clicking outside
document.addEventListener('click',e=>{
  const sw=document.getElementById('lang-switcher');
  if(sw&&!sw.contains(e.target)){
    const m=document.getElementById('lang-menu');
    if(m)m.style.display='none';
  }
});
function switchTeamLang(l,flag){
  lang=l;t=T[l];
  localStorage.setItem('mm_lang',l);
  document.getElementById('tv-lang-flag').textContent=flag;
  document.getElementById('lang-menu').style.display='none';
  applyLang();
  // re-apply palette labels
  buildPalette('tv-palette','pickTvColor');
  // update attempt counter label
  if(challenge)document.getElementById('tv-max').textContent=challenge.maxGuesses;
}
// Set correct flag on load based on current lang
function initLangFlag(){
  const flags={en:'🇺🇸',de:'🇩🇪',zh:'🇨🇳',sk:'🇸🇰',pl:'🇵🇱'};
  const el=document.getElementById('tv-lang-flag');
  if(el)el.textContent=flags[lang]||'🇺🇸';
}
window.addEventListener('load',initBg);
</script>
